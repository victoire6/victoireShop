<!-- OK decorations badgets pro + update sales-->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestion des Dépenses</title>

<style>
:root {
  --primary:#0B5FFF;
  --dark:#111;
  --light:#f5f7fa;
  --danger:#e74c3c;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--light);
  padding-bottom:calc(100px + env(safe-area-inset-bottom));
}

/* HEADER */
.header {
  background:#fff;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.shortcut {
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:10px 14px;
    background:#0B5FFF;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  
/* CONTAINER */
.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* SWITCH */
.switch-box {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.switch-box button {
  flex:1;
  padding:10px;
  border:none;
  cursor:pointer;
  background:#ddd;
  border-radius:8px;
  transition:0.2s;
}

.switch-box button.active {
  background:var(--primary);
  color:#fff;
}

/* FORM */
.form-box {
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.form-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

input, select, textarea {
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  width:90%;
}

textarea {
  grid-column:span 2;
}

/* LIST */
.list {
  background:#fff;
  padding:10px;
  border-radius:10px;
}

/* HIDE */
.hidden { display:none; }

/* BTN */
.btn {
  width:100%;
  padding:10px;
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}

/* displayed*/
.expense-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #eee;
}

.expense-item button {
  padding:6px 10px;
  border:none;
  background:#0B5FFF;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.expense-item small {
  display:block;
  color:#777;
}
.badge {
  font-size:11px;
  padding:3px 6px;
  border-radius:6px;
  color:#fff;
  margin-left:6px;
}

.badge-expense {
  background: #0B5FFF; /* dépense normale = bleu */
}
.badge-debt {
  background: #8e44ad; /* dette = violet */
}
.badge-loss {
  background: #e74c3c; /* perte = rouge */
}
.badge-paid {
  background: #27ae60; /* payé = vert */
}
.badge-partial {
  background: #f39c12; /* partiel = orange */
}

/* NAV */
nav{
  position:fixed;
  left:0;
  bottom:0;

  width:100%;

  display:flex;
  justify-content:space-between;
  align-items:stretch;
  gap:8px;

  padding:8px 10px calc(8px + env(safe-area-inset-bottom));

  background:#111;

  border-top:1px solid rgba(255,255,255,0.08);

  z-index:1000;

  overflow:hidden;
}

nav .nav-item{
  flex:1;

  min-width:0;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  gap:4px;

  min-height:52px;

  padding:8px 4px;

  border-radius:10px;

  text-decoration:none;

  color:#E5E5E5;

  font-size:11px;
  font-weight:600;

  text-align:center;

  transition:
  background 0.2s ease,
  color 0.2s ease,
  transform 0.15s ease;

  overflow:hidden;
}

nav .nav-item span{
  width:100%;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

nav .nav-item:hover{
  background:rgba(212,175,55,0.08);
}

nav .nav-item:active{
  transform:scale(0.96);
}

nav .nav-item.active{
  background:rgba(212,175,55,0.12);
  color:#D4AF37;
}

@media(min-width:768px){

  nav{
    max-width:900px;

    left:50%;
    transform:translateX(-50%);

    border-radius:16px 16px 0 0;
  }

  nav .nav-item{
    font-size:12px;
  }

}

@media(min-width:1200px){

  nav{
    max-width:1000px;
  }

}
 
.filters-box {
  display:flex;
  flex-direction:column;
  gap:16px;
}

.filters-title {
  font-size:15px;
  font-weight:700;
  color:#111;
  margin:0;
}

.filters-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}

.filter-group {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.filter-group label {
  font-size:12px;
  font-weight:600;
  color:#555;
}

.filter-group input,
.filter-group select {
  width:100%;
  box-sizing:border-box;
  background:#fff;
  border:1px solid #dfe3ea;
  border-radius:10px;
  padding:11px 12px;
  font-size:14px;
  outline:none;
  transition:0.2s;
}

.filter-group input:focus,
.filter-group select:focus {
  border-color:#0B5FFF;
  box-shadow:0 0 0 3px rgba(11,95,255,0.10);
}

.filters-actions {
  display:flex;
  justify-content:flex-end;
}

.filter-btn {
  width:auto;
  min-width:160px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#0B5FFF;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.filter-btn:hover {
  opacity:0.92;
}

@media (max-width:650px){

  .filters-grid {
    grid-template-columns:1fr 1fr;
  }

}

@media (max-width:480px){

  .filters-grid {
    grid-template-columns:1fr;
  }

}
</style>
</head>

<body>

<div class="header">
  <h2>💼 Expenses System</h2>
  <a  href="#expensesList" class="shortcut">
  📋 Voir la liste
  </a>
</div>

<div class="container">
<div id="debug" style="color:red;font-size:13px"></div>

<!-- SWITCH -->
<div class="switch-box">
  <button id="btnExpense" class="active">💸 Dépense</button>
  <button id="btnDebt">📉 Dette</button>
  <button id="btnLoss">❌ Perte</button>
</div>

<!-- ================= EXPENSE ================= -->
<div id="expenseForm" class="form-box">
  <h3>Dépense</h3>

  <div class="form-grid">
    <input type="text" id="label" placeholder="Label">

    <select id="category">
      <option value="salary">Salaire</option>
      <option value="reinvestment">Réinvestissement</option>
      <option value="tax">Taxe</option>
      <option value="maintenance">Maintenance</option>
      <option value="rent">Loyer</option>
      <option value="other">Autre</option>
    </select>

    <input type="number" id="amount" placeholder="Montant">

    <select id="type">
      <option value="fixed">Fixe</option>
      <option value="variable">Variable</option>
    </select>

    <input type="text" id="relatedTo" placeholder="Lié à">

    <textarea id="note" placeholder="Note"></textarea>
  </div>

  <button class="btn" id="addExpenseBtn">Ajouter</button>
</div>

<!-- ================= DEBT ================= -->
<div id="debtForm" class="form-box hidden">
  <h3>Dette</h3>

  <div class="form-grid">
    <select id="debtType">
      <option value="client">Client</option>
      <option value="supplier">Fournisseur</option>
    </select>

    <input type="text" id="debtName" placeholder="Nom">

    <input type="number" id="debtAmount" placeholder="Montant De dette">
    <input type="number" id="debtPayed" placeholder="Montant Payer">

    <input type="text" id="debtPhone" placeholder="Téléphone">

    <input type="date" id="debtDueDate">

    <textarea id="debtNote" placeholder="Note"></textarea>
  </div>

  <button class="btn" id="addDebtBtn">Créer dette</button>
</div>

<!-- ================= LOSS ================= -->
<div id="lossForm" class="form-box hidden">

  <h3>📦 Perte produit</h3>

  <select id="productSelect"></select>
  <input type="number" id="productQuantityLost" placeholder="Quantité">

  <select id="productLossReason">
    <option value="loss">Perte</option>
    <option value="break">Casse</option>
    <option value="stock_error">Erreur stock</option>
  </select>

  <button class="btn" id="submitProductLoss">Valider produit</button>

  <hr style="margin:15px 0">

  <h3>💰 Perte argent</h3>

  <input type="number" id="moneyLostAmount">

  <select id="moneyLossReason">
    <option value="vol">Vol</option>
    <option value="faux_billet">Faux billet</option>
    <option value="erreur_caisse">Erreur caisse</option>
    <option value="other">Autre</option>
  </select>

  <button class="btn" id="submitMoneyLoss">Valider argent</button>
</div>

<!-- FILTERS -->
<div class="form-box filters-box">

  <h3 class="filters-title">
    🔎 Filtres & Recherche
  </h3>

  <div class="filters-grid">

    <div class="filter-group">
      <label for="filterGenre">
        Genre (Firebase)
      </label>

      <select id="filterGenre"></select>
    </div>

    <div class="filter-group">
      <label for="startDate">
        Date début
      </label>

      <input type="date" id="startDate">
    </div>

    <div class="filter-group">
      <label for="endDate">
        Date fin
      </label>

      <input type="date" id="endDate">
    </div>

    <div class="filter-group">
      <label for="searchInput">
        Recherche globale
      </label>

      <input
        type="text"
        id="searchInput"
        placeholder="Nom, catégorie, raison..."
      >
    </div>

    <div class="filter-group">
      <label for="filterStatus">
        Statut
      </label>

      <select id="filterStatus"></select>
    </div>

    <div class="filter-group">
      <label for="filterCategory">
        Catégorie
      </label>

      <select id="filterCategory"></select>
    </div>

    <div class="filter-group">
      <label for="filterDebtType">
        Type dette
      </label>

      <select id="filterDebtType">
        <option value="all">Toutes</option>
        <option value="client">Clients</option>
        <option value="supplier">Fournisseurs</option>
      </select>
    </div>

  </div>

  <div class="filters-actions">

    <button
      id="applyFirebaseFilter"
      class="filter-btn"
      type="button"
    >
      Appliquer filtres
    </button>

  </div>

</div>


<!-- LIST -->
<div class="list" id="expensesList"></div>

</div>

<br><br>
<!-- NAV -->
<nav>
  <div class="nav-item" data-page="index.html">🛒 Vente rapide</div>
  <div class="nav-item" data-page="products.html">📦 Produits</div>
  <div class="nav-item" data-page="stats.html">📊 Stats</div>
  <div class="nav-item" data-page="pages.html">🌐 Navigation</div> 
  <div class="nav-item active" data-page="losses.html">❌ Pertes</div>
</nav>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const buttons = {
    expense: document.getElementById("btnExpense"),
    debt: document.getElementById("btnDebt"),
    loss: document.getElementById("btnLoss"),
  };

  const forms = {
    expense: document.getElementById("expenseForm"),
    debt: document.getElementById("debtForm"),
    loss: document.getElementById("lossForm"),
  };

  function showForm(type) {
    Object.values(forms).forEach(f => f.classList.add("hidden"));
    Object.values(buttons).forEach(b => b.classList.remove("active"));

    forms[type].classList.remove("hidden");
    buttons[type].classList.add("active");
  }

  // ✅ UNE SEULE MÉTHODE → addEventListener
  buttons.expense.addEventListener("click", () => showForm("expense"));
  buttons.debt.addEventListener("click", () => showForm("debt"));
  buttons.loss.addEventListener("click", () => showForm("loss"));

});
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll('nav .nav-item').forEach(item => {
    item.addEventListener('click', () => {
      location.href = item.dataset.page;
    });
  });
});
</script>
<script type="module" src="js/expensess.js"></script>

</body>
</html>
