<html lang="fr">
<head>

  <title>Stock Achats fournisseurs</title>
  <link rel="stylesheet" href="style.css">
  <style>
    header {
      background: #0B3D2E;
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .status { font-size: 12px; color: #D4AF37; }

    .search-bar {
      padding: 10px;
      position: sticky;
      top: 0;
      background: #F5F5F5;
      z-index: 10;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding-bottom:calc(120px + env(safe-area-inset-bottom));
      background: #f5f6fa;
    }

    h2 {
      text-align: center;
      margin-top: 20px;
    }
.commande {
  width: 95%;
  margin: 15px auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.commande button {
  padding: 8px 12px;
  background: #0B3D2E;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.commande{
  width:95%;
  margin:15px auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}

.commande h2{
  margin:0;
  font-size:20px;
  flex:1;
}

    form {
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    form input, form select {
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    form button {
      padding: 10px;
      background: #192a56;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    table {
      width: 95%;
      margin: 20px auto;
      border-collapse: collapse;
      background: #fff;
    }

    table th, table td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    table th {
      background: #192a56;
      color: white;
    }
    .search-box {
  width: 95%;
  margin: 10px auto;
}

.search-box input {
  width: 90%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.filtre {
  width: 95%;
  margin: 10px auto;
  display: flex;
  justify-content: flex-end;
}

#stockFilter {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
  width: 150px;
}

#debug{
  position:fixed;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  z-index:999999;

  max-width:90%;
  min-width:220px;

  padding:12px 16px;

  border-radius:12px;

  background:#111;
  color:#fff;

  font-size:13px;
  font-weight:600;

  text-align:center;

  opacity:0;
  pointer-events:none;

  transition:opacity .25s ease;
}

#debug.show{
  opacity:1;
}

#purchaseForm.purchase-overlay{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:9999;
width:min(500px,95%);
max-height:90vh;
overflow:auto;
padding:20px;
background:#fff;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

#purchaseForm.purchase-overlay::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:-1;
}

/* tableau */
#stockTable th,
#stockTable td{
  padding:8px 6px;
  border-bottom:1px solid #ddd;
  text-align:center;
  white-space:normal;
  overflow-wrap:anywhere;
  word-break:break-word;
}

#stockTable th{
  font-size:13px;
}

#stockTable td{
  font-size:12px;
}
#stockTable td:last-child{
  width:130px;
}
#stockTable td:last-child button{
  display:block;
  width:100%;
  margin:2px 0;
  padding:5px;
  font-size:11px;
}
.table-wrapper{
  width:95%;
  margin:20px auto;
  overflow-x:auto;
}

#stockTable{
  width:100%;
  table-layout:auto;
}

/* nav*/
nav{
  position:fixed;
  left:0;
  bottom:0;

  width:100%;

  display:flex;
  justify-content:space-between;
  align-items:stretch;
  gap:8px;

  padding:8px 10px calc(8px + env(safe-area-inset-bottom));

  background:#111;

  border-top:1px solid rgba(255,255,255,0.08);

  z-index:1000;

  overflow:hidden;
}

nav .nav-item{
  flex:1;

  min-width:0;

  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  gap:4px;

  min-height:52px;

  padding:8px 4px;

  border-radius:10px;

  text-decoration:none;

  color:#E5E5E5;

  font-size:11px;
  font-weight:600;

  text-align:center;

  transition:
  background 0.2s ease,
  color 0.2s ease,
  transform 0.15s ease;

  overflow:hidden;
}

nav .nav-item span{
  width:100%;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

nav .nav-item:hover{
  background:rgba(212,175,55,0.08);
}

nav .nav-item:active{
  transform:scale(0.96);
}

nav .nav-item.active{
  background:rgba(212,175,55,0.12);
  color:#D4AF37;
}

@media(min-width:768px){

  nav{
    max-width:900px;

    left:50%;
    transform:translateX(-50%);

    border-radius:16px 16px 0 0;
  }

  nav .nav-item{
    font-size:12px;
  }
}

@media(min-width:1200px){

  nav{
    max-width:1000px;
  }

}
  </style>
</head>
<body>
<header>
  <h3>StockFlow</h3>
  <div class="status" id="status">● Online</div>
</header>

<div id="debug"></div>

<div class="commande">
<h2>Ajouter une commande fournisseur</h2>
<button id="addPurchaseBtn">➕ Ajouter achat</button>
</div>
<form id="purchaseForm" style="display:none;">

  <label>Fournisseur :</label>
  <input type="text" id="supplierName" required>

  <label>Produit :</label>
  <select id="productSelect" required>
    <option value="">-- Sélectionner --</option>
  </select>

  <input type="text" id="productName" placeholder="Nouveau produit" style="display:none;">

  <label>Quantité :</label>
  <input type="number" id="quantity" min="1" required>

  <label>Prix unitaire (si ≠ ancien) :</label>
  <input type="number" id="unitPrice" min="0.01" step="0.01">

  <button type="submit">Ajouter commande</button>
</form>

<div class="filtre">
<select id="stockFilter">
  <option value="all">Tous</option>
  <option value="low">Stock faible</option>
</select>
</div>
<div class="search-box">
  <input type="text" id="stockSearch" placeholder="Rechercher produit...">
</div>

<h2>Stock actuel</h2>
<div class="table-wrapper" id="tableWrapper">
<table id="stockTable">
  <thead>
    <tr>
      <th>Produit</th>
      <th>Stock</th>
      <th>Prix</th>
      <th>Total</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>

</nav>

</body>
</html>
