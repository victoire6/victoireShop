<html lang="fr">
<head>
<meta charset="UTF-8">

base-uri 'self';

<title>StockFlow - Ranking</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:
    radial-gradient(circle at top,#1a1a1a,#0a0a0a 70%);
  color:#fff;

  min-height:100vh;

  padding:
    20px
    15px
    100px;
}

/* HEADER */

.header{
  margin-bottom:25px;
}

.header h1{
  font-size:28px;
  margin-bottom:6px;

  background:
    linear-gradient(
      90deg,
      #ffd700,
      #fff3b0,
      #ffd700
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:
    goldFlow 3s linear infinite;
}

.header p{
  color:#aaa;
  font-size:13px;
}

@keyframes goldFlow{

  0%{
    filter:brightness(1);
  }

  50%{
    filter:brightness(1.35);
  }

  100%{
    filter:brightness(1);
  }

}

/* SECTION */

.section{
  margin-bottom:28px;
}

.section-title{
  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-bottom:14px;
}

.section-title h2{
  font-size:18px;
}

/* GRID */

.rank-grid{
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* CARD */

.rank-card{
  position:relative;

  overflow:hidden;

  background:#151515;

  border-radius:18px;

  padding:16px;

  border:
    1px solid
    rgba(255,255,255,0.06);

  transition:
    transform .2s ease,
    border .2s ease,
    box-shadow .2s ease;
}

.rank-card:hover{
  transform:translateY(-2px);
}

/* GOLD */

.rank-card.gold{
  background:
    linear-gradient(
      135deg,
      rgba(255,215,0,0.15),
      rgba(255,255,255,0.04)
    );

  border:
    1px solid
    rgba(255,215,0,0.4);

  box-shadow:
    0 0 20px
    rgba(255,215,0,0.15);
}

.rank-card.gold::before{
  content:"";

  position:absolute;

  top:-40%;
  left:-20%;

  width:60%;
  height:180%;

  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,0.15),
      transparent
    );

  transform:rotate(25deg);

  animation:
    shine 3.2s linear infinite;
}

@keyframes shine{

  0%{
    left:-50%;
  }

  100%{
    left:130%;
  }

}

/* RED */

.rank-card.low{
  background:
    linear-gradient(
      135deg,
      rgba(255,0,0,0.10),
      rgba(255,255,255,0.03)
    );

  border:
    1px solid
    rgba(255,0,0,0.18);
}

/* TOP */

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:10px;

  gap:10px;
}

.product-name{
  font-size:16px;
  font-weight:700;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.rank-badge{
  min-width:48px;

  padding:5px 8px;

  border-radius:999px;

  text-align:center;

  font-size:12px;
  font-weight:bold;
}

.rank-badge.best{
  background:
    rgba(255,215,0,0.14);

  color:#ffd700;
}

.rank-badge.low{
  background:
    rgba(255,0,0,0.14);

  color:#ff6b6b;
}

/* STATS */

.card-stats{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.stat-line{
  display:flex;
  justify-content:space-between;
  align-items:center;

  font-size:13px;
}

/* BAR */

.progress{
  margin-top:12px;

  width:100%;
  height:12px;

  border-radius:999px;

  overflow:hidden;

  background:
    rgba(255,255,255,0.05);
}

.progress-fill{
  height:100%;
  border-radius:999px;

  transition:width .4s ease;
}

.progress-fill.gold{
  background:
    linear-gradient(
      90deg,
      #b8860b,
      #ffd700,
      #fff1a8
    );

  box-shadow:
    0 0 12px
    rgba(255,215,0,0.4);
}

.progress-fill.red{
  background:
    linear-gradient(
      90deg,
      #8b0000,
      #ff4d4d
    );
}

/* EMPTY */

.empty{
  text-align:center;
  color:#777;

  padding:30px 15px;

  background:#151515;

  border-radius:16px;
}

/* NAV */

nav{
  position:fixed;
  bottom:0;
  width:100%;
  left:0;

  background:#111;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:6px 10px;
  gap:6px;

  z-index:1000;
}

nav .nav-item{
  flex:1;
  min-width:0;

  text-align:center;

  padding:7px 5px;

  border-radius:7px;

  text-decoration:none;
  color:inherit;

  font-size:11px;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;

  transition:.2s;
}

nav .nav-item.active{
  background:
    rgba(212,175,55,0.12);

  color:#D4AF37;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
  <h1>🏆 StockFlow Ranking</h1>
  <p>
    Classement intelligent des produits
    les plus performants. - depuis récemment 
  </p>
</div>

<!-- TOP PRODUCTS -->

<section class="section">

  <div class="section-title">
    <h2>🥇 Top Produits</h2>
  </div>

  <div class="rank-grid" id="topProducts">

    <!-- JS -->

  </div>

</section>

<!-- LOW PRODUCTS -->

<section class="section">

  <div class="section-title">
    <h2>⚠️ Produits Faibles</h2>
  </div>

  <div class="rank-grid" id="lowProducts">

    <!-- JS -->

  </div>

</section>
